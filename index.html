<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030508;
  --s1:#0a1018;
  --t0:#e8f4f0;
  --t1:#b8d4cc;
  --t3:#4a6860;
  --tl:#00d4a8;
  --pk:#ff6b9d;
  --grad:linear-gradient(135deg,#00d4a8,#ff6b9d);
  --grad-text:linear-gradient(135deg,#00d4a8 0%,#00f0c0 40%,#ff6b9d 100%);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(circle at 30% 20%, rgba(0,212,168,0.08) 0%, transparent 50%),
             radial-gradient(circle at 70% 80%, rgba(255,107,157,0.06) 0%, transparent 50%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:180px;
  pointer-events:none;
}

.main{height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.status-box{
  text-align:center;
  background:var(--s1);
  border:1px solid rgba(0,212,168,0.25);
  border-radius:24px;
  padding:80px 60px;
  max-width:520px;
  box-shadow:0 0 120px rgba(0,212,168,0.15),
             inset 0 0 80px rgba(0,0,0,0.6);
  animation:fadeIn 1.2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:none}}

.status-icon{
  font-size:92px;
  margin-bottom:24px;
  display:block;
  animation:pulse 3s infinite ease-in-out;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.status-title{
  font-size:32px;
  font-weight:800;
  background:var(--grad-text);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:16px;
  line-height:1.1;
}
.status-sub{
  font-size:15.5px;
  color:var(--t3);
  line-height:1.65;
  max-width:380px;
  margin:0 auto;
}
.status-dot{
  display:inline-block;
  width:8px;height:8px;
  background:var(--tl);
  border-radius:50%;
  animation:blink 1.4s infinite;
  margin:0 4px;
}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
</style>
</head>
<body>

<div class="main">
  <div class="status-box">
    <span class="status-icon">🔧</span>
    <div class="status-title">phX is currently under-going changes</div>
    <div class="status-sub">
      We're rebuilding things from the ground up to make it faster and cleaner.<br><br>
      <strong>Back online very soon.</strong><br>
      Thanks for waiting <span class="status-dot"></span>
    </div>
  </div>
</div>

</body>
</html>
