<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{rebranded}</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;
  --s1:#111;
  --np:#b721d6;
  --pk:#f0609a;
  --grad:linear-gradient(135deg,#b721d6,#f0609a,#ff8ac4);
  --grad-text:linear-gradient(90deg,#b721d6,#d946ef,#f0609a,#ff8ac4);
}
html,body{
  height:100%; overflow:hidden; background:var(--bg); color:#ccc;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center;
  position:relative;
}
body::before{
  content:''; position:fixed; inset:0;
  background:radial-gradient(circle at 30% 20%, rgba(183,33,214,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(240,96,154,0.06) 0%, transparent 50%);
  background-size:cover;
  pointer-events:none; z-index:-2;
}
body::after{
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:-1;
}

.glow1, .glow2{
  position:fixed; width:800px; height:800px; border-radius:50%;
  background:radial-gradient(circle, rgba(183,33,214,0.12) 0%, transparent 70%);
  filter:blur(80px); z-index:-1; animation: pulse 15s ease-in-out infinite;
}
.glow1{top:-30%; left:-20%; animation-delay:0s;}
.glow2{bottom:-30%; right:-20%; background:radial-gradient(circle, rgba(240,96,154,0.1) 0%, transparent 70%); animation-delay:7s;}

.main{
  text-align:center; max-width:680px; padding:40px; z-index:10;
  animation: fadeIn 1.2s ease;
}

.logo{
  font-size:108px; font-weight:900; letter-spacing:-8px;
  background:var(--grad-text); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:8px; text-shadow:0 0 60px rgba(183,33,214,0.6);
  animation: logoPop 2s cubic-bezier(0.34,1.56,0.64,1);
}

.message{
  font-size:32px; font-weight:700; color:#fff; margin:16px 0 8px;
  background:linear-gradient(90deg,#fff,#ddd); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}

.sub{
  font-size:21px; color:#aaa; margin-bottom:42px;
}

.new-url{
  display:inline-block; margin:20px 0 30px;
  padding:18px 54px; font-size:19px; font-weight:700;
  background:var(--grad); color:white; border-radius:9999px;
  text-decoration:none; box-shadow:0 10px 40px rgba(183,33,214,0.4);
  transition:all .3s cubic-bezier(0.4,0,0.2,1);
  position:relative; overflow:hidden;
}
.new-url:hover{
  transform:scale(1.08) translateY(-4px);
  box-shadow:0 20px 60px rgba(183,33,214,0.6);
}
.new-url::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  transform:translateX(-150%); transition:0.7s;
}
.new-url:hover::after{transform:translateX(300%);}

.minecraft{
  font-family:'Space Mono',monospace; font-size:15px; color:#f0609a;
  margin-top:50px; opacity:0.9; letter-spacing:1px;
}

@keyframes logoPop{0%{transform:scale(0.6) rotate(-8deg);} 60%{transform:scale(1.15);} 100%{transform:scale(1);}}
@keyframes fadeIn{from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:none;}}
@keyframes pulse{0%,100%{opacity:0.6} 50%{opacity:1}}
</style>
</head>
<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="main">
  <div class="logo">ph34</div>
  <div class="message">We've rebranded and updated!</div>
  <div class="sub">Which means... a brand new link!</div>
  
  <a href="https://Netherrack.vercel.app" class="new-url" target="_blank">
    netherrack
  </a>
  
  <div class="minecraft">woah minecraft 🤤</div>
</div>

</body>
</html>
